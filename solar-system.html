<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Solar System | Jericho Bellen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="style/main.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <main class="container my-5">
        <div class="mb-4">
            <a href="index.html" class="text-primary text-decoration-none">
                <i class="fas fa-arrow-left me-2"></i>Back to Portfolio
            </a>
        </div>

        <section class="mb-5">
            <h1 class="display-3 fw-bold text-white mb-3">3D Solar System</h1>

        </section>

        <div class="row g-5">
            <div class="col-lg-8">
                <div class="glass-card p-2">
                    <div class="ratio ratio-16x9">
                        <div class="d-flex align-items-center justify-content-center bg-dark rounded">

                    </div>
                </div>
            </div>
            
            <div class="col-lg-4">
                <div class="glass-card p-4">
                    <h4 class="text-white mb-3">Technical Specs</h4>
                    <ul class="list-unstyled text-white-50">
                        <li class="mb-2"><i class="fas fa-check-circle text-primary me-2"></i>Software: Blender</li>
                        <li class="mb-2"><i class="fas fa-check-circle text-primary me-2"></i>Technique: PBR Texturing</li>
                        <li class="mb-2"><i class="fas fa-check-circle text-primary me-2"></i>Focus: Atmospheric Scattering</li>
